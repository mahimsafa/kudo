syntax = "proto3";

package kudo;

option go_package = "github.com/mahimsafa/kudo/internal/api/proto";

service KudoAPI {
    rpc Apply(ApplyRequest) returns (ApplyResponse);
    rpc Remove(RemoveRequest) returns (RemoveResponse);
    rpc GetStatus(StatusRequest) returns (StatusResponse);
    rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
    rpc ListApplications(ListAppsRequest) returns (ListAppsResponse);
    rpc ScaleApplication(ScaleRequest) returns (ScaleResponse);
}

message ApplyRequest {
    string yaml_content = 1;
}

message ApplyResponse {
    bool success = 1;
    string message = 2;
}

message RemoveRequest {
    string yaml_content = 1;
    // When true, continue removing cluster state and routes if workloads are already gone.
    bool force_missing_workloads = 2;
}

message DependencyInfo {
    string app_name = 1;
    string dependent_app = 2;
    string reason = 3;
    string shared_resource = 4;
}

message RemoveResponse {
    bool success = 1;
    string message = 2;
    repeated DependencyInfo blockers = 3;
    repeated string warnings = 4;
    // Set when workloads are missing; re-run with force_missing_workloads after user confirms.
    bool confirm_required = 5;
}

message StatusRequest {
    string app_name = 1;
}

message StatusResponse {
    string app_name = 1;
    string adapter = 2;
    int32 desired_replicas = 3;
    int32 running_replicas = 4;
    repeated InstanceInfo instances = 5;
}

message InstanceInfo {
    string id = 1;
    string node_id = 2;
    string status = 3;
    string address = 4;
}

message ListNodesRequest {}

message ListNodesResponse {
    repeated NodeInfo nodes = 1;
}

message NodeInfo {
    string id = 1;
    string name = 2;
    string address = 3;
    string status = 4;
}

message ListAppsRequest {}

message ListAppsResponse {
    repeated AppInfo apps = 1;
}

message AppInfo {
    string name = 1;
    string adapter = 2;
    int32 replicas = 3;
    string status = 4;
}

message ScaleRequest {
    string app_name = 1;
    int32 replicas = 2;
}

message ScaleResponse {
    bool success = 1;
    string message = 2;
}
