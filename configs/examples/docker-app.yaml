kind: Application
name: nginx-demo
adapter: docker
replicas: 2
spec:
  image: nginx:alpine
  ports:
    - port: 80
routing:
  domain: demo.example.com
  path: /
  local_access: true   # allows: curl http://127.0.0.1:8088/  (proxy port in local dev)
  ingress_port: 8088   # must match agent proxy listen port (8088 without /etc/kudo/kudo.yaml)
  algorithm: round-robin
  healthcheck:
    path: /
    interval: 10s
    timeout: 3s
    unhealthy_threshold: 3
